<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="finalrecipe.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/cascadia-code/index.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Final Recipe</title>
  </head>
  <body>
    <nav class="navbar">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="tutorial.html">Tutorial</a></li>
        <li><a href="setuprecipe.html">Create</a></li>
        <li><a href="library.html">Library</a></li>
      </ul>
    </nav>

    <div class="recipe-page">
    <div class="recipe-container">
      <div id="loadingMessage" class="loading">Loading your community recipe...</div>
      <div id="errorMessage" class="error" style="display:none">Unable to load recipe. Please go back and complete the setup.</div>

      <div id="recipeContent" style="display:none">
        <div class="recipe-header">
          <h1 id="communityName"></h1>
          <div class="community-meta">
            <span class="community-type-badge" id="communityType"></span>
            <span class="community-link-val" id="communityLink"></span>
          </div>
        </div>

        <hr class="rule-thick">
        <div id="modulesContent"></div>

        <div class="action-buttons">
          <button class="btn-download" onclick="downloadRecipe()">Download Text</button>
          <button class="btn-download" onclick="downloadRecipeImage()">Download Image</button>
          <button class="btn-download" onclick="copyRecipeHTML()">Copy Code</button>
          <a href="setuprecipe.html" class="btn-edit">Edit</a>
        </div>
      </div>
    </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

    <script type="module">
      import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

      const supabaseUrl = "https://sewbsumjjlpsbadgwgfk.supabase.co";
      const supabaseKey = "sb_publishable_wSb8KHh3lvlLMMCxSTLQ-Q_bYqvk77x";
      const supabase = createClient(supabaseUrl, supabaseKey);

      const communityId = localStorage.getItem("communityId");

      const moduleColumnMappings = {
        "Infrastructure":        "infrastructure_data",
        "Membership + Roles":    "membership_data",
        "Rules":                 "rules_data",
        "Federation":            "federation_data",
        "Data/Privacy":          "dataprivacy_data",
        "Community Processes":   "communityprocesses_data",
        "Legal Compliance":      "legalcompliance_data",
      };

      // Human-readable labels. null = skip the field entirely.
      const FIELD_LABELS = {
        communityRulesLink:   "Rules Link",
        covenants:            "Covenants",
        adaptedFrom:          "Adapted From",
        rulesBuilder:         "Rules",
        structure:            "Structure",
        roles:                "Roles",
        registration:         "Registration",
        approvalMethod:       "Approval Method",
        selectedFederation:   "Federation Mode",
        selectedBridging:     "Bridging",
        customBridging:       null,
        selectedBlocklists:   "Blocklists",
        selectedReasons:      "Defederation Reasons",
        customReasons:        null,
        selectedStrategy:     "Strategy",
        strategyNotes:        "Strategy Notes",
        antiMeta:             "Anti-Meta Fedipact",
        moderation:           "Moderation",
        reporting:            "Reporting",
        decisionMaking:       "Decision-Making",
        updates:              "Updates",
        feedback:             "Feedback",
        protocolAnswer:       null,
        protocol:             "Protocol",
        software:             "Software",
        softwareVersion:      "Version",
        stack:                "Tech Stack",
        hostingType:          "Hosting",
        hostingDetails:       "Hosting Details",
        costsWhat:            "Costs",
        costCoverage:         "Cost Coverage",
        customCostCoverage:   null,
        donationLinks:        "Donate",
        channels:             "Channels",
        privacyPolicyUrl:     "Privacy Policy",
        logRetention:         "Log Retention",
        protectionMeasures:   "Protection",
        country:              "Country",
        selectedRegulations:  "Regulations",
        customRegulations:    null,
        dmcaAgent:            "DMCA Agent",
      };

      async function loadRecipe() {
        if (!communityId) { showError(); return; }

        try {
          const { data: community, error } = await supabase
            .from("communities")
            .select("*")
            .eq("id", communityId)
            .single();

          if (error || !community) { showError(); return; }

          document.getElementById("communityName").textContent = community.name || "Community";
          document.getElementById("communityType").textContent = formatType(community.type);

          const linkEl = document.getElementById("communityLink");
          if (community.link) {
            linkEl.innerHTML = `<a href="${escAttr(community.link)}" target="_blank">${escHtml(community.link)}</a>`;
          }

          const modulesContent = document.getElementById("modulesContent");
          modulesContent.innerHTML = "";

          const selectedModules = community.selected_modules || [];

          for (const moduleName of selectedModules) {
            const columnName = moduleColumnMappings[moduleName];
            if (!columnName || !community[columnName]) continue;
            const moduleData = community[columnName];
            if (!hasActualData(moduleData)) continue;
            renderModule(moduleName, moduleData);
          }

          document.getElementById("loadingMessage").style.display = "none";
          document.getElementById("recipeContent").style.display = "block";
        } catch (e) {
          console.error(e);
          showError();
        }
      }

      function formatType(type) {
        const map = {
          fediverse: "Fediverse Server",
          chat: "Chat Group",
          wiki: "Wiki",
          social: "Social Network",
          forum: "Forum",
          citizen_science: "Citizen Science",
          other: "Other",
        };
        return map[type] || type || "";
      }

      function renderModule(moduleName, data) {
        const modulesContent = document.getElementById("modulesContent");

        const section = document.createElement("div");
        section.className = "module-section";

        const header = document.createElement("div");
        header.className = "module-header";
        const h2 = document.createElement("h2");
        h2.textContent = moduleName;
        header.appendChild(h2);
        section.appendChild(header);

        const content = document.createElement("div");
        content.className = "module-content";

        for (const [key, value] of Object.entries(data)) {
          // Skip fields labelled null
          if (key in FIELD_LABELS && FIELD_LABELS[key] === null) continue;

          // Skip empty values
          if (value === null || value === undefined || value === "") continue;
          if (Array.isArray(value) && value.length === 0) continue;
          if (typeof value === "object" && !Array.isArray(value)) {
            if (!hasActualData(value)) continue;
          }

          const labelText = FIELD_LABELS[key] ?? formatFieldName(key);

          if (key === "rulesBuilder") {
            const row = buildRulesRow(value);
            if (row) content.appendChild(row);
            continue;
          }

          const row = document.createElement("div");
          row.className = "data-item";

          const labelEl = document.createElement("div");
          labelEl.className = "data-label";
          labelEl.textContent = labelText;

          const valueEl = document.createElement("div");
          valueEl.className = "data-value";

          if (typeof value === "boolean") {
            valueEl.textContent = value ? "Yes" : "No";
          } else if (key === "channels" && Array.isArray(value)) {
            valueEl.innerHTML = value
              .filter(ch => ch.url)
              .map(ch => `<a href="${escAttr(ch.url)}" target="_blank">${escHtml(ch.platform || "Link")}</a>`)
              .join(", ") || "—";
          } else if (key === "donationLinks" && Array.isArray(value)) {
            valueEl.innerHTML = value
              .filter(d => d.url)
              .map(d => `<a href="${escAttr(d.url)}" target="_blank">${escHtml(d.label || "Donate")}</a>`)
              .join(", ") || "—";
          } else if (Array.isArray(value)) {
            const items = value.filter(v => v !== null && v !== undefined && v !== "");
            if (items.length === 0) continue;
            if (typeof items[0] === "object") {
              valueEl.innerHTML = formatObjectArray(items).replace(/\n/g, "<br>");
            } else {
              valueEl.textContent = items.join(", ");
            }
          } else if (key === "dmcaAgent" && typeof value === "object") {
            const nested = document.createElement("div");
            nested.className = "nested-value";
            for (const [k, v] of Object.entries(value)) {
              if (!v) continue;
              const nr = document.createElement("div");
              nr.className = "nested-row";
              nr.textContent = `${formatFieldName(k)}: ${v}`;
              nested.appendChild(nr);
            }
            valueEl.appendChild(nested);
          } else if (key === "strategyNotes" && typeof value === "object") {
            const nested = document.createElement("div");
            nested.className = "nested-value";
            for (const [k, v] of Object.entries(value)) {
              if (!v) continue;
              const nr = document.createElement("div");
              nr.className = "nested-row";
              nr.textContent = `${k}: ${v}`;
              nested.appendChild(nr);
            }
            if (!nested.children.length) continue;
            valueEl.appendChild(nested);
          } else if (typeof value === "object" && !Array.isArray(value)) {
            const nested = document.createElement("div");
            nested.className = "nested-value";
            for (const [k, v] of Object.entries(value)) {
              if (!v) continue;
              const nr = document.createElement("div");
              nr.className = "nested-row";
              nr.textContent = `${formatFieldName(k)}: ${v}`;
              nested.appendChild(nr);
            }
            if (!nested.children.length) continue;
            valueEl.appendChild(nested);
          } else {
            valueEl.textContent = String(value);
          }

          row.appendChild(labelEl);
          row.appendChild(valueEl);
          content.appendChild(row);
        }

        if (!content.children.length) return;
        section.appendChild(content);
        modulesContent.appendChild(section);
      }

      function buildRulesRow(rulesBuilder) {
        const categories = [];
        for (const [catId, catState] of Object.entries(rulesBuilder)) {
          const checked = Object.entries(catState.checked || {}).filter(([, v]) => v);
          if (!checked.length) continue;
          categories.push({ id: catId, rules: checked.map(([rule]) => ({
            text: rule,
            qualifier: catState.qualifiers?.[rule] || null,
          }))});
        }
        if (!categories.length) return null;

        const row = document.createElement("div");
        row.className = "data-item";
        row.style.alignItems = "flex-start";

        const labelEl = document.createElement("div");
        labelEl.className = "data-label";
        labelEl.textContent = "Rules";

        const valueEl = document.createElement("div");
        valueEl.className = "data-value";
        valueEl.style.textAlign = "right";

        for (const cat of categories) {
          const catDiv = document.createElement("div");
          catDiv.className = "rules-category";

          const catName = document.createElement("div");
          catName.className = "rules-cat-name";
          catName.textContent = formatFieldName(cat.id);
          catDiv.appendChild(catName);

          const tagList = document.createElement("div");
          tagList.className = "rules-list";
          tagList.style.justifyContent = "flex-end";

          for (const r of cat.rules) {
            const tag = document.createElement("span");
            tag.className = r.qualifier ? "rule-tag has-qualifier" : "rule-tag";
            tag.textContent = r.qualifier ? `${r.text} → ${r.qualifier}` : r.text;
            tagList.appendChild(tag);
          }

          catDiv.appendChild(tagList);
          valueEl.appendChild(catDiv);
        }

        row.appendChild(labelEl);
        row.appendChild(valueEl);
        return row;
      }

      function formatObjectArray(items) {
        return items.map(item => {
          if (item.url && item.platform) return `${item.platform}: ${item.url}`;
          if (item.url && item.label)    return `${item.label}: ${item.url}`;
          if (item.username !== undefined) return [item.username, item.role].filter(Boolean).join(" — ");
          if (item.purpose !== undefined || item.software !== undefined) return [item.purpose, item.software].filter(Boolean).join(": ");
          if (item.value !== undefined)  return item.url ? `${formatFieldName(item.value)}: ${item.url}` : formatFieldName(item.value);
          return Object.entries(item).filter(([, v]) => v).map(([k, v]) => `${formatFieldName(k)}: ${v}`).join(", ");
        }).join("\n");
      }

      function formatFieldName(key) {
        return key
          .replace(/_/g, " ")
          .replace(/([a-z])([A-Z])/g, "$1 $2")
          .split(" ")
          .map(w => w.charAt(0).toUpperCase() + w.slice(1))
          .join(" ");
      }

      function hasActualData(obj) {
        if (obj === null || obj === undefined || obj === "") return false;
        if (Array.isArray(obj)) return obj.length > 0 && obj.some(hasActualData);
        if (typeof obj === "object") return Object.values(obj).some(hasActualData);
        return true;
      }

      function escHtml(str) {
        return (str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
      }
      function escAttr(str) {
        return (str || "").replace(/"/g,"&quot;");
      }

      function showError() {
        document.getElementById("loadingMessage").style.display = "none";
        document.getElementById("errorMessage").style.display = "block";
      }

      window.copyRecipeHTML = function () {
        const container = document.getElementById("recipeContent");
        navigator.clipboard.writeText(container.innerHTML)
          .then(() => alert("Recipe HTML copied!"))
          .catch(err => console.error(err));
      };

      window.downloadRecipe = function () {
        const text = document.getElementById("recipeContent").innerText;
        const a = document.createElement("a");
        a.href = URL.createObjectURL(new Blob([text], { type: "text/plain" }));
        a.download = "community-recipe.txt";
        a.click();
      };

      window.downloadRecipeImage = async function () {
        const container = document.getElementById("recipeContent");
        const buttons = container.querySelector(".action-buttons");
        if (buttons) buttons.style.display = "none";

        const wrapper = document.createElement("div");
        wrapper.style.cssText = "padding:40px;background:#f5f0e8;display:inline-block;";
        container.parentNode.insertBefore(wrapper, container);
        wrapper.appendChild(container);

        const canvas = await html2canvas(wrapper, {
          scale: 3,
          backgroundColor: "#f5f0e8",
          useCORS: true,
          scrollY: -window.scrollY,
        });

        wrapper.parentNode.insertBefore(container, wrapper);
        wrapper.remove();
        if (buttons) buttons.style.display = "flex";

        const a = document.createElement("a");
        a.href = canvas.toDataURL("image/png");
        a.download = "community-recipe.png";
        a.click();
      };

      loadRecipe();
    </script>
  </body>
</html>
