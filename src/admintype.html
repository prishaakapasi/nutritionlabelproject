<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="admintype.css" />
    <link rel="stylesheet" href="mastersheet.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Handjet:wght@100..900&display=swap" rel="stylesheet">
    <title> Roles </title>
    <style>
      .admin-section {
        width: 100%;
        max-width: 900px;
      }
    </style>
</head>
<body>
  <nav class="navbar">
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="tutorial.html">Tutorial</a></li>
      <li><a href="setuprecipe.html">Create</a></li>
      <li><a href="library.html">Library</a></li>
    </ul>
  </nav>
  
  <div class="content-wrapper">
    <aside class="sidebar">
      <nav class="sidebar-nav" id="dynamicNav"></nav>
    </aside>

    <main>

      <h1> Structure </h1>
      <h3>Let people know how your community is moderated and administered. </h3>
      <div id="modulesContainer" class="button-container">
        <button class="admintype-btn module-btn">Team</button>
        <button class="admintype-btn module-btn">Cooperative</button>
        <button class="admintype-btn module-btn">Benevolent Dictator</button>
        <button id="addModuleBtn">+</button>
      </div>

      <div id="newModuleContainer" style="display: none;">
        <input type="text" id="newModuleText" placeholder="Enter new admin type...">
        <div class="button-group">
          <button id="saveModule">Save</button>
          <button id="cancelModule">Cancel</button>
        </div>
      </div>

      <div class="admin-section">
        <h2>Add Usernames of Admins</h2>
        <div id="adminList" class="covenant-list"></div>
        <button id="addAdminBtn" class="add-btn">+ Add Admin</button>
      </div>

      <h1>Membership</h1>
      <h3>Select your type of membership.</h3>
      <div id="membershipContainer" class="button-container">
        <button class="membership-btn module-btn">Open Membership</button>
        <button class="membership-btn module-btn">Closed Membership</button>
      </div>

      <div id="memberTypesSection">
        <h2>Member Types</h2>
        <textarea
          id="memberTypes"
          placeholder="Describe (if any) the different types of members and what each can do."
          rows="6"
        ></textarea>
      </div>

    </main>
  </div>

  <script type="module" src="navigation.js"></script>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const supabaseUrl = "https://sewbsumjjlpsbadgwgfk.supabase.co";
    const supabaseKey = "sb_publishable_wSb8KHh3lvlLMMCxSTLQ-Q_bYqvk77x";
    const supabase = createClient(supabaseUrl, supabaseKey);

    let admins = [];


    function showMemberTypes(show) {
      document.getElementById('memberTypesSection').style.display = show ? 'block' : 'none';
    }


    function createAdminItem(username = '') {
      const item = document.createElement('div');
      item.className = 'covenant-item';

      const input = document.createElement('input');
      input.type = 'text';
      input.placeholder = 'ex: https://server/@user';
      input.value = username;
      input.addEventListener('input', () => { updateAdminsArray(); autoSaveData(); });

      const removeBtn = document.createElement('button');
      removeBtn.className = 'remove-btn';
      removeBtn.textContent = '−';
      removeBtn.addEventListener('click', () => { item.remove(); updateAdminsArray(); autoSaveData(); });

      item.appendChild(input);
      item.appendChild(removeBtn);
      return item;
    }

    function updateAdminsArray() {
      admins = Array.from(document.querySelectorAll('#adminList input'))
        .map(i => i.value.trim())
        .filter(v => v !== '');
    }


    async function loadData() {
      const communityId = localStorage.getItem("communityId");
      if (!communityId) { console.error("No community ID found"); return; }

      const { data, error } = await supabase
        .from("communities")
        .select("membership_data, admin_data")
        .eq("id", communityId)
        .single();

      if (error) { console.error("Error loading data:", error); return; }

      if (data.membership_data) populateMembership(data.membership_data);
      if (data.admin_data)      populateAdmin(data.admin_data);
      else document.getElementById('adminList').appendChild(createAdminItem());
    }

    function populateMembership(d) {
      if (d.selectedType) {
        document.querySelectorAll('.membership-btn').forEach(btn => {
          if (btn.textContent === d.selectedType) btn.classList.add('selected');
        });
        showMemberTypes(d.selectedType === 'Closed Membership');
      }
      if (d.memberTypes) document.getElementById('memberTypes').value = d.memberTypes;
    }

    function populateAdmin(d) {
      if (d.selectedType) {
        document.querySelectorAll('.admintype-btn').forEach(btn => {
          if (btn.textContent === d.selectedType) btn.classList.add('selected');
        });
      }

      if (d.customTypes && Array.isArray(d.customTypes)) {
        const modulesContainer = document.getElementById('modulesContainer');
        const addBtn = document.getElementById('addModuleBtn');
        d.customTypes.forEach(type => {
          const newButton = document.createElement('button');
          newButton.className = 'admintype-btn module-btn';
          if (type === d.selectedType) newButton.classList.add('selected');
          newButton.textContent = type;
          modulesContainer.insertBefore(newButton, addBtn);
          newButton.addEventListener('click', function () {
            document.querySelectorAll('.admintype-btn').forEach(b => b.classList.remove('selected'));
            this.classList.add('selected');
            autoSaveData();
          });
        });
      }

      const adminList = document.getElementById('adminList');
      adminList.innerHTML = '';
      if (d.usernames && d.usernames.length > 0) {
        d.usernames.forEach(u => adminList.appendChild(createAdminItem(u)));
      } else {
        adminList.appendChild(createAdminItem());
      }
      updateAdminsArray();
    }


    function collectData() {
      const selectedMembership = document.querySelector('.membership-btn.selected');
      const selectedAdmin = document.querySelector('.admintype-btn.selected');
      const defaultTypes = ['Team', 'Cooperative', 'Benevolent Dictator'];

      const customTypes = [];
      document.querySelectorAll('.admintype-btn').forEach(btn => {
        if (!defaultTypes.includes(btn.textContent)) customTypes.push(btn.textContent);
      });

      updateAdminsArray();

      return {
        membership: {
          selectedType: selectedMembership ? selectedMembership.textContent : null,
          memberTypes:  document.getElementById('memberTypes').value,
        },
        admin: {
          selectedType: selectedAdmin ? selectedAdmin.textContent : null,
          customTypes,
          usernames: admins,
        }
      };
    }

    async function saveData() {
      const communityId = localStorage.getItem("communityId");
      if (!communityId) { console.error("No community ID found"); return false; }

      const { membership, admin } = collectData();

      const { error } = await supabase
        .from("communities")
        .update({ membership_data: membership, admin_data: admin })
        .eq("id", communityId);

      if (error) { console.error("Error saving data:", error); return false; }
      console.log("Data saved successfully");
      return true;
    }

    let saveTimeout;
    function autoSaveData() {
      clearTimeout(saveTimeout);
      saveTimeout = setTimeout(saveData, 1000);
    }


    document.addEventListener("DOMContentLoaded", () => {
      loadData();

      document.querySelectorAll('.membership-btn').forEach(btn => {
        btn.addEventListener('click', function () {
          document.querySelectorAll('.membership-btn').forEach(b => b.classList.remove('selected'));
          this.classList.add('selected');
          showMemberTypes(this.textContent === 'Closed Membership');
          autoSaveData();
        });
      });

      document.querySelectorAll('.admintype-btn').forEach(btn => {
        btn.addEventListener('click', function () {
          document.querySelectorAll('.admintype-btn').forEach(b => b.classList.remove('selected'));
          this.classList.add('selected');
          autoSaveData();
        });
      });

      document.getElementById('addAdminBtn').addEventListener('click', () => {
        document.getElementById('adminList').appendChild(createAdminItem());
      });

      document.getElementById('memberTypes').addEventListener('input', autoSaveData);

      const addModuleBtn     = document.getElementById('addModuleBtn');
      const newModuleContainer = document.getElementById('newModuleContainer');
      const newModuleText    = document.getElementById('newModuleText');
      const saveModule       = document.getElementById('saveModule');
      const cancelModule     = document.getElementById('cancelModule');
      const modulesContainer = document.getElementById('modulesContainer');

      addModuleBtn.addEventListener('click', () => {
        newModuleContainer.style.display = 'block';
        newModuleText.focus();
      });

      saveModule.addEventListener('click', () => {
        const newModule = newModuleText.value.trim();
        if (newModule) {
          const newButton = document.createElement('button');
          newButton.className = 'admintype-btn module-btn';
          newButton.textContent = newModule;
          newButton.addEventListener('click', function () {
            document.querySelectorAll('.admintype-btn').forEach(b => b.classList.remove('selected'));
            this.classList.add('selected');
            autoSaveData();
          });
          modulesContainer.insertBefore(newButton, addModuleBtn);
          newModuleContainer.style.display = 'none';
          newModuleText.value = '';
          autoSaveData();
        }
      });

      cancelModule.addEventListener('click', () => {
        newModuleContainer.style.display = 'none';
        newModuleText.value = '';
      });

      newModuleText.addEventListener('keypress', e => {
        if (e.key === 'Enter') saveModule.click();
      });
    });
  </script>
</body>
</html>
